apiVersion: apps/v1
kind: Deployment
metadata:
  name: non-persisting-deployment
spec:
  replicas: 3
  selector:
    matchLabels:
      app: non-persisting-deployment
  template:
    metadata:
      labels:
        app: non-persisting-deployment
    spec:
      containers:
        - name: nginx
          image: nginx:1.19.2
          resources:
            limits:
              cpu: 25m
              memory: 64Mi
            requests:
              cpu: 25m
              memory: 64Mi
