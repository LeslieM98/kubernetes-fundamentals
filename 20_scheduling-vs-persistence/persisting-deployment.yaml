apiVersion: apps/v1
kind: Deployment
metadata:
  name: persisting-deployment
spec:
  replicas: 3
  selector:
    matchLabels:
      app: persisting-deployment
  template:
    metadata:
      labels:
        app: persisting-deployment
    spec:
      containers:
        - name: nginx
          image: nginx:1.19.2
          resources:
            limits:
              cpu: 25m
              memory: 64Mi
            requests:
              cpu: 25m
              memory: 64Mi
          volumeMounts:
            - name: my-volume
              mountPath: /some-dir
      volumes:
        - name: my-volume
          persistentVolumeClaim:
            claimName: my-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: my-pvc
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: standard
  resources:
    requests:
      storage: 10Mi
